# ==============================================================================
# Framework Configuration File
# Computer Vision Training with Ultralytics YOLO11
# ==============================================================================

# ------------------------------------------------------------------------------
# Project Configurations
# ------------------------------------------------------------------------------
project:
  name: "Person_Object_Detection"     # Name of the project/experiment
  description: "Default object detection project using YOLO11"

# ------------------------------------------------------------------------------
# Roboflow Configurations
# Settings for automatically downloading datasets from Roboflow
# ------------------------------------------------------------------------------
roboflow:
  workspace: "1-wzlq9"    # Roboflow workspace name
  project: "cctv-naxyo-bw63v"        # Roboflow project name
  version: 1                          # Dataset version to download
  api_key: "0htZvFKkU7BablvNYlHh"    # Your Roboflow API Key

# ------------------------------------------------------------------------------
# Model Configurations
# ------------------------------------------------------------------------------
model:
  pretrained_path: "yolo11s.pt"       # Path or name of the pretrained YOLO11 model (e.g., yolo11n.pt, yolo11s.pt, yolo11m.pt)
  task: "detect"                      # Ultralytics task (detect, segment, classify, pose, obb)

# ------------------------------------------------------------------------------
# Training Configurations
# Ultralytics YOLO training arguments
# ------------------------------------------------------------------------------
training:
  output_dir: "experiments"            # Base directory for Ultralytics training runs
  experiment_name: "Person_Object_Detection"  # Run folder name under output_dir
  epochs: 1                           # Number of training epochs
  batch: 16                           # Batch size (set to -1 for AutoBatch)
  imgsz: 640                          # Image size (pixels)
  device: "cpu"                       # Device to run on (e.g., 'cpu', '0', '0,1'). Leave empty for auto-detect
  optimizer: "auto"                   # Optimizer (auto, SGD, Adam, AdamW, NAdam, RAdam, RMSProp)
  lr0: 0.01                           # Initial learning rate
  lrf: 0.01                           # Final learning rate (lr0 * lrf)
  patience: 50                        # Early stopping patience (epochs without improvement)
  workers: 8                          # Number of worker threads for data loading
  exist_ok: False                     # Whether to overwrite existing experiment folder

# ------------------------------------------------------------------------------
# Validation Configurations
# This framework has two validation modes:
# 1) Automatic Validation: runs after training in scripts/train.py
# 2) Standalone Validation: runs via scripts/validate.py without retraining
#
# Notes:
# - This section is intended for Standalone Validation configuration.
# - Automatic Validation uses training flow internals and validation split behavior.
# ------------------------------------------------------------------------------
validation:
  #model_path: "trained_models/Person_Object_Detection.pt" # Model (.pt) for standalone validation
  #dataset_yaml: "datasets/cctv-naxyo-bw63v-1/data.yaml"   # Dataset YAML path for standalone validation
  #dataset_yaml_path: "datasets/cctv-naxyo-bw63v-1/data.yaml" # Compatibility key used by current ValidationService
  #split: "test"                        # Dataset split for standalone validation (val or test)
  output_dir: "experiments/validation" # Output directory for standalone validation artifacts
  #device: "cpu"                        # Device for standalone validation (cpu, 0, 0,1)
  conf: 0.25                            # Confidence threshold for standalone validation
  iou: 0.6                              # NMS IoU threshold for standalone validation
  half: false                           # Use half precision (FP16) for validation where supported
  plots: true                           # Save plots such as confusion matrix and curves

# ------------------------------------------------------------------------------
# Video Processing Configurations
# Settings for CCTV video input and frame extraction process
# ------------------------------------------------------------------------------
video:
  input_dir: "data/videos"            # Directory for CCTV video input files
  output_dir: "data/frames"           # Directory for extracted frame outputs
  extraction:
    mode: "fps"                      # Extraction mode (fps or interval)
    fps: 1                            # Frames per second when mode is fps
    interval_seconds: 5               # Frame interval in seconds when mode is interval
  image_format: "jpg"                # Output frame image format (jpg or png)
  ffmpeg_path: "ffmpeg"              # FFmpeg executable path or command

# ------------------------------------------------------------------------------
# Output & System Directories
# ------------------------------------------------------------------------------
output:
  datasets_dir: "datasets"            # Where to download and extract datasets
  pretrained_dir: "pretrained"        # Where to store downloaded pretrained base models
  experiments_dir: "experiments"      # Where Ultralytics will save training runs
  trained_models_dir: "trained_models" # Where the best exported models will be copied
